# This workflow downloads artifacts from a (by default, draft) release and runs
# a short smoke test where the application is installed and run and immediately
# shut down.
# Since we need contents-write permissions to look at draft releases, we
# actually download the artifacts in a smaller job, then upload them into the
# run and download it _again_ in the second (per-platform) job where no
# permissions are required.
name: Release smoke test
permissions: {}
on:
  workflow_dispatch:
    inputs:
      tag:
        description: >
          Download artifacts from release with this tag, rather than picking the
          first draft release.
        type: string
      obs-project:
        description: >
          OpenSUSE Build Service project to download AppImage from, in the form
          of "home:username:projectname". The default is the devel project used
          in final pre-release smoke tests.
        type: string
        default: "isv:Rancher:dev"
      skip-signing-checks:
        description: >
          Skip signature checks on downloaded artifacts (fails the tests).
        type: boolean
        default: false

jobs:
  find-release:
    name: Find release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to list draft releases
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    outputs:
      release-tag: ${{ steps.set-release-tag.outputs.release-tag }}
    steps:
    - name: Find release
      if: inputs.tag == ''
      run: |
        set -o xtrace
        gh api repos/${{ github.repository }}/releases --jq 'map(select(.draft))[0].tag_name' > release-tag
        RELEASE_TAG=$(cat release-tag)
        if [[ -z "$RELEASE_TAG" ]]; then
          echo "Failed to find release tag" >&2
          exit 1
        fi
        echo "RELEASE_TAG=$RELEASE_TAG" >>"$GITHUB_ENV"
      env:
        GH_TOKEN: ${{ github.token }}
    - id: set-release-tag
      run: printf "release-tag=%s\n" "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
  download-installer:
    name: Download Installers
    needs: find-release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to download from draft releases
    steps:
    - run: |
        gh release download "$RELEASE_TAG" \
          --repo ${{ github.repository }} \
          --pattern '*.dmg' \
          --pattern '*.dmg.sha512sum' \
          --pattern '*.msi' \
          --pattern '*.msi.sha512sum' \
          --pattern 'rancher-desktop-linux-*.zip' \
          --pattern 'rancher-desktop-linux-*.zip.sha512sum'
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_TAG: ${{ needs.find-release.outputs.release-tag }}
    - name: Upload macOS aarch-64 artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: application-macos-aarch64.zip
        if-no-files-found: error
        path: |
          *.aarch64.dmg
          *.aarch64.dmg.sha512sum
    - name: Upload macOS x86_64 artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: application-macos-x86_64.zip
        if-no-files-found: error
        path: |
          *.x86_64.dmg
          *.x86_64.dmg.sha512sum
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: application-win32.zip
        if-no-files-found: error
        path: |
          *.msi
          *.msi.sha512sum
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: application-linux.zip
        if-no-files-found: error
        path: |
          rancher-desktop-linux-*.zip
          rancher-desktop-linux-*.zip.sha512sum

  download-appimage:
    name: Download Linux AppImage
    needs: find-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - run: |
        # The OBS project needs to have a slash added after each colon.
        OBS_DOWNLOAD_URL=https://download.opensuse.org/download/repositories/${OBS_PROJECT//:/:/}/AppImage/
        branch=$(cut -d. -f1,2 <<< "${RELEASE_TAG#v}")
        read -r artifact_name < <(
          curl "${OBS_DOWNLOAD_URL}?jsontable" \
            | jq --raw-output ".data[].name | select(endswith(\".AppImage\")) | select(contains(\".release${branch}.\"))"
          )
        curl -L -o rancher-desktop.AppImage "${OBS_DOWNLOAD_URL}${artifact_name}"
        # The AppImage does not have a checksum; make one up.
        sha512sum rancher-desktop.AppImage > rancher-desktop.AppImage.sha512sum
        chmod a+x rancher-desktop.AppImage
      env:
        OBS_PROJECT: ${{ inputs.obs-project }}
        RELEASE_TAG: ${{ needs.find-release.outputs.release-tag }}
    - name: Upload Linux AppImage
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: application-linux.AppImage
        if-no-files-found: error
        path: |
          rancher-desktop.AppImage
          rancher-desktop.AppImage.sha512sum

  smoke-test-installer:
    name: Smoke test installers
    needs: download-installer
    strategy:
      fail-fast: false
      matrix:
        include:
        - { platform: macos-aarch64, runs-on: macos-14 }
        - { platform: macos-x86_64, runs-on: macos-15-intel }
        - { platform: win32, runs-on: windows-latest }
        - { platform: linux, runs-on: ubuntu-latest }
    runs-on: ${{ matrix.runs-on }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up environment
      uses: ./.github/actions/setup-environment

    - name: "Linux: Set startup command"
      if: runner.os == 'Linux'
      run: echo "EXEC_COMMAND=$EXEC_COMMAND" >> "$GITHUB_ENV"
      env:
        EXEC_COMMAND: >-
          exec xvfb-run --auto-servernum
          --server-args='-screen 0 1280x960x24'
    - name: "Linux: Install Extra Packages"
      if: runner.os == 'Linux'
      run: |
        set -o xtrace
        sudo apt-get update
        sudo apt-get install --yes --no-install-recommends \
          ovmf qemu-system qemu-utils

    - name: Set log directory
      shell: bash
      # Use node here to do path manipulation to get correct Windows paths.
      run: >-
        node --eval='
        var join = require("path").join;
        var l = join(process.cwd(), "logs");
        console.log("LOGS_DIR=" + l);
        console.log("RDD_LOG_DIR=" + join(l, "rd"));
        ' >> "$GITHUB_ENV"

    - name: Download artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: application-${{ matrix.platform }}.zip
    - run: ${{ env.EXEC_COMMAND }} .github/workflows/smoke-test/smoke-test.sh
      shell: bash
      env:
        RD_SKIP_SIGNING_CHECKS: ${{ inputs.skip-signing-checks }}
        RDD_KEEP_LOGS: '1'
    - name: Collect Lima Logs
      if: always()
      shell: bash
      run: |
        # Lima should output its logs to the RD log directory, but it currently
        # doesn't; collect them manually here.
        set +o errexit
        shopt -s nullglob
        mkdir -p "${LOGS_DIR}/lima"
        case "$(uname -o | tr 'A-Z' 'a-z')" in
          msys)
            # On Windows/MSYS, the home directory is USERPROFILE.
            HOME="$(cygpath -u "$USERPROFILE")";;
        esac
        for file in "${HOME}"/.rd2/lima/rd/*.log; do
          cp -v "$file" "$LOGS_DIR/lima/$(basename "$file")"
        done
    - name: Upload logs
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: logs-${{ matrix.platform }}.zip
        path: ${{ github.workspace }}/logs
        if-no-files-found: warn

  smoke-test-repository:
    name: Smoke test repository
    needs: find-release
    strategy:
      fail-fast: false
      matrix:
        include:
        - { id: opensuse-tumbleweed, image: "registry.opensuse.org/opensuse/tumbleweed:latest"}
        - { id: opensuse-leap, image: "registry.opensuse.org/opensuse/leap:latest" }
        - { id: debian, image: "debian:latest" }
        - { id: fedora, image: "fedora:latest" }
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
      options: --privileged
    steps:
    - name: Disable AppArmor User Namespace Restrictions
      run: |
        # This is needed because even though we run in a container for a
        # different distribution, we're still running the Ubuntu kernel in the
        # runner VM.  Filed as
        # https://github.com/rancher-sandbox/rancher-desktop-2/issues/459
        set +o errexit
        echo 0 > /proc/sys/kernel/apparmor_restrict_unprivileged_userns
    - name: Install basic tools
      if: contains(matrix.id, 'opensuse')
      run: >-
        zypper --non-interactive install
        gawk git-core tar
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Set up user
      run: |
        useradd --create-home --user-group ci-user
        export LOGS_DIR=$PWD/logs
        export RDD_LOG_DIR=$LOGS_DIR/rd
        echo "LOGS_DIR=$LOGS_DIR" >> "$GITHUB_ENV"
        echo "RDD_LOG_DIR=$RDD_LOG_DIR" >> "$GITHUB_ENV"
        mkdir -p $RDD_LOG_DIR
        chown --recursive ci-user "$LOGS_DIR"
    - uses: ./.github/actions/setup-environment
    - name: Install Rancher Desktop from package
      if: runner.os == 'Linux'
      run: .github/workflows/smoke-test/install-from-repo.sh
      env:
        RD_VERSION: ${{ needs.find-release.outputs.release-tag }}
        OBS_PROJECT: ${{ inputs.obs-project }}
    - name: Run smoke test
      shell: bash
      run: |
        inner_command=(
          xvfb-run
            --auto-servernum
            --server-args='-screen 0 1280x960x24'
          $PWD/.github/workflows/smoke-test/smoke-test.sh
        )
        sudo --user=ci-user --login --set-home --non-interactive \
          /usr/bin/env --chdir=$PWD \
            RD_DEBUG_ENABLED=1 RD_TEST=smoke RD_SKIP_INSTALL=true \
            RDD_LOG_DIR=$RDD_LOG_DIR RDD_KEEP_LOGS=1 \
          script \
            --log-out $LOGS_DIR/repo-${{ matrix.id }}.log \
            --return --command "${inner_command[*]@Q}"

    - name: Take screenshot
      if: failure()
      continue-on-error: true
      shell: >-
        sudo --user=ci-user --login --set-home --non-interactive
        bash --noprofile --norc -eo pipefail {0}
      run: |
        set -o xtrace -o errexit
        PID=$(pidof smoke-test.sh || echo missing)
        if [[ ! -r /proc/$PID/environ ]]; then
          echo "Rancher Desktop is not running" >&2
          exit 0
        fi
        export $(gawk 'BEGIN { RS="\0"; FS="=" } ($1 == "DISPLAY" || $1 == "XAUTHORITY") { print }' \
          < /proc/$PID/environ)
        env
        export MAGICK_DEBUG=All # spellcheck-ignore-line
        gm import -window root -verbose $LOGS_DIR/screenshot-${{ matrix.id }}.png

    - name: Collect Lima Logs
      if: always()
      shell: bash
      run: |
        # Lima should output its logs to the RD log directory, but it currently
        # doesn't; collect them manually here.
        set +o errexit
        shopt -s nullglob
        mkdir -p "${LOGS_DIR}/lima"
        for file in ~ci-user/.rd2/lima/rd/*.log; do
          cp --verbose "$file" "$LOGS_DIR/lima/$(basename "$file")"
        done
    - name: Upload logs
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: logs-repo-${{ matrix.id }}.zip
        path: ${{ github.workspace }}/logs
        if-no-files-found: warn

  smoke-test-appimage:
    name: Smoke test AppImage
    needs: download-appimage
    strategy:
      fail-fast: false
      matrix:
        include:
        - { id: opensuse, image: "registry.opensuse.org/opensuse/tumbleweed:latest" }
        - { id: rocky, image: "rockylinux/rockylinux:9" }
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
      options: --privileged
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Set up user
      run: |
        useradd --create-home --user-group ci-user
        export LOGS_DIR=$PWD/logs
        export RDD_LOG_DIR=$LOGS_DIR/rd
        echo "LOGS_DIR=$LOGS_DIR" >> "$GITHUB_ENV"
        echo "RDD_LOG_DIR=$RDD_LOG_DIR" >> "$GITHUB_ENV"
        mkdir -p $RDD_LOG_DIR
        chown --recursive ci-user "$LOGS_DIR"
    - uses: ./.github/actions/setup-environment
      with:
        user: ci-user

    - name: Install qemu
      run: |
        source /etc/os-release
        for id in $ID $ID_LIKE; do
          case $id in
            suse|opensuse)
              zypper --non-interactive install qemu-headless
              exit 0;;
            fedora)
              dnf install --assumeyes qemu-img qemu-system-x86
              exit 0;;
            rocky|rhel|centos)
              # On Rock/RHEL/CentOS, qemu is not available; we add a third-party
              # repository to get it.
              dnf --nogpg --assumeyes install \
                https://mirror.ghettoforge.net/distributions/gf/gf-release-latest.gf.el${VERSION_ID%%.*}.noarch.rpm
              dnf --assumeyes install epel-release
              dnf --assumeyes install qemu-img qemu-system-x86
              exit 0;;
            debian|ubuntu)
              apt-get update
              apt-get install --yes ovmf qemu-system qemu-utils
              exit 0;;
          esac
        done
        printf "Could not find known distribution in [%s %s]\n" "$ID" "$ID_LIKE" >&2
        exit 1

    - name: Download AppImage
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: application-linux.AppImage

    - name: Run smoke test
      run: |
        inner_command=(
          xvfb-run
            --auto-servernum
            --server-args='-screen 0 1280x960x24'
          $PWD/.github/workflows/smoke-test/smoke-test.sh
        )
        sudo --user=ci-user --login --set-home --non-interactive \
          /usr/bin/env --chdir=$PWD \
            RD_DEBUG_ENABLED=1 RD_TEST=smoke \
            RDD_LOG_DIR=$RDD_LOG_DIR RDD_KEEP_LOGS=1 \
          script \
            --log-out $LOGS_DIR/appimage-${{ matrix.id }}.log \
            --return --command "${inner_command[*]@Q}" \

    - name: Take screenshot
      if: failure()
      continue-on-error: true
      shell: >-
        sudo --user=ci-user --login --set-home --non-interactive
        bash --noprofile --norc -eo pipefail {0}
      run: |
        set -o xtrace -o errexit
        PID=$(pidof rancher-desktop.AppImage || echo missing)
        if [[ ! -r /proc/$PID/environ ]]; then
          echo "Rancher Desktop is not running" >&2
          exit 0
        fi
        export $(gawk 'BEGIN { RS="\0"; FS="=" } ($1 == "DISPLAY" || $1 == "XAUTHORITY") { print }' \
          < /proc/$PID/environ)
        env
        export MAGICK_DEBUG=All # spellcheck-ignore-line
        gm import -window root -verbose $LOGS_DIR/screenshot-${{ matrix.id }}.png

    - name: Collect Lima Logs
      if: always()
      shell: bash
      run: |
        # Lima should output its logs to the RD log directory, but it currently
        # doesn't; collect them manually here.
        set +o errexit
        shopt -s nullglob
        mkdir -p "${LOGS_DIR}/lima"
        for file in ~ci-user/.rd2/lima/rd/*.log; do
          cp --verbose "$file" "$LOGS_DIR/lima/$(basename "$file")"
        done
    - name: Upload logs
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: logs-appimage-${{ matrix.id }}.zip
        path: ${{ github.workspace }}/logs
        if-no-files-found: warn

  flag-skipped-signing-checks:
    name: Flag that signing checks were skipped
    needs: [smoke-test-installer, smoke-test-repository, smoke-test-appimage]
    runs-on: ubuntu-latest
    if: inputs.skip-signing-checks
    steps:
    - run: |
        echo "Force failing smoke tests because signature checks were skipped." >&2
        exit 1
