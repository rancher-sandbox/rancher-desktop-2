cpus: 2
memory: "6442450944"
mounts:
- location: "~"
  writable: true
ssh:
  localPort: 51422
  loadDotSSHPubKeys: false
firmware:
  legacyBIOS: false
containerd:
  system: false
  user: false
portForwards:
- guestIPMustBeZero: true
  guestPortRange:
  - 1
  - 65535
  hostIP: 0.0.0.0
  hostPortRange:
  - 0
  - 0
- guestPortRange:
  - 0
  - 0
  guestSocket: /var/run/docker.sock
  hostPortRange:
  - 0
  - 0
  hostSocket: "{{.Home}}/.rd/docker.sock"
hostResolver:
  hosts:
    host.docker.internal: host.lima.internal
    host.rancher-desktop.internal: host.lima.internal
    lima-rancher-desktop: lima-0
rosetta:
  enabled: false
  binfmt: false
